<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Platforma do zarządzania szkołami tańca i klubami sportowymi" />
    <meta name="theme-color" content="#262626" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48">
    <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml">

    <!-- Apple / iOS -->
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BookingHub">

    <title>BookingHub</title>
    <!-- Anti-flash: ustaw motyw i kolor paska systemowego przed renderem React -->
    <script>
      (function() {
        var theme = localStorage.getItem('bookinghub-theme') ?? 'dark';
        document.documentElement.classList.toggle('dark', theme === 'dark');
        var color = theme === 'dark' ? '#262626' : '#f9f9f9';
        document.querySelector('meta[name="theme-color"]').setAttribute('content', color);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
